<form>

<label class="option">
<span class="distance">Carrera 8KM</span>
<span class="price">$25.000</span>

<p class="alias">Alias:
        <b style="cursor:pointer; color:rgb(86, 14, 32);" onclick="copiarAlPortapapeles('MI.ALIAS.EJEMPLO', this)">
        MI.ALIAS.EJEMPLO
        </b>
    </p>
    <p  class="alias">CVU: 
        <b style="cursor:pointer; color:rgb(90, 15, 15);" onclick="copiarAlPortapapeles('0000003100012345678901', this)">
        0000003100012345678901
        </b>
    </p>
    <p  class="alias">envía el comprobante a <a href="https://wa.me/2475413188">2475413188</a></p>

    <script>
        function copiarAlPortapapeles(texto, elemento) {
    navigator.clipboard.writeText(texto).then(() => {
        // Guardamos el texto original para restaurarlo después
        const textoOriginal = elemento.innerText;
        
        // Cambio visual temporal para feedback
        elemento.innerText = "¡Copiado!";
        elemento.style.color = "green";

        setTimeout(() => {
            elemento.innerText = textoOriginal;
            elemento.style.color = "blue";
        }, 1000);
    }).catch(err => {
        console.error('Error al copiar: ', err);
    });
}
    </script>


</form>
